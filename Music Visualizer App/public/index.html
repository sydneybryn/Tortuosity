<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>tortuosity</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel-bg: rgba(20, 20, 20, 0.78);
    --panel-border: #2a2a2a;
    --divider: #1d1d1d;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-faint: #5a5a5a;
    --accent: #b388ff;
    --accent-soft: rgba(179, 136, 255, 0.14);
    --accent-glow: rgba(179, 136, 255, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    overflow: hidden;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  #visualizer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    display: block;
  }

  .hidden { display: none !important; }

  /* ===== Drop / upload overlay (shown until a file is loaded) ===== */
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: rgba(10, 10, 10, 0.96);
    backdrop-filter: blur(10px);
  }
  .overlay-content { text-align: center; padding: 0 24px; }
  .logo {
    font-size: 3.6rem;
    font-weight: 200;
    letter-spacing: 0.4em;
    color: var(--accent);
    text-shadow: 0 0 24px var(--accent-glow);
    margin-bottom: 0.5rem;
    text-transform: lowercase;
  }
  .tagline {
    color: var(--text-dim);
    letter-spacing: 0.25em;
    margin-bottom: 3rem;
    font-size: 0.78rem;
    text-transform: uppercase;
  }
  .upload-btn {
    display: inline-block;
    padding: 14px 44px;
    border: 1px solid var(--accent);
    color: var(--accent);
    cursor: pointer;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 0.78rem;
    transition: background 0.2s, box-shadow 0.2s;
    background: transparent;
    font-family: inherit;
  }
  .upload-btn:hover {
    background: var(--accent-soft);
    box-shadow: 0 0 22px var(--accent-glow);
  }
  .hint {
    color: var(--text-faint);
    margin-top: 1.5rem;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
  }

  /* ===== Side panel ===== */
  .panel {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 300px;
    background: var(--panel-bg);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-right: 1px solid var(--panel-border);
    padding: 80px 22px 100px;
    overflow-y: auto;
    z-index: 8;
    transition: transform 0.35s cubic-bezier(.2,.8,.2,1), opacity 0.35s;
  }
  .panel.collapsed {
    transform: translateX(-110%);
  }
  .panel-section {
    margin-bottom: 22px;
  }
  .panel-section + .panel-section {
    padding-top: 22px;
    border-top: 1px solid var(--divider);
  }
  .section-label, .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .slider-label span:last-child {
    color: var(--accent);
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
  }

  /* Sliders */
  input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: var(--panel-border);
    outline: none;
    border-radius: 1px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 10px var(--accent-glow);
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
    box-shadow: 0 0 10px var(--accent-glow);
  }

  /* Button grids */
  .grid {
    display: grid;
    gap: 6px;
  }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }

  .opt-btn {
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    padding: 9px 6px;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    text-transform: uppercase;
  }
  .opt-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .opt-btn.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Palettes */
  .palette-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }
  .palette-btn {
    height: 32px;
    border: 1px solid var(--panel-border);
    background: linear-gradient(90deg, var(--p1) 0%, var(--p1) 33%, var(--p2) 33%, var(--p2) 66%, var(--p3) 66%, var(--p3) 100%);
    cursor: pointer;
    border-radius: 2px;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    padding: 0;
  }
  .palette-btn:hover { transform: translateY(-1px); }
  .palette-btn.active {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
  }
  .custom-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .custom-row label {
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    flex: 1;
  }
  input[type="color"] {
    width: 38px;
    height: 26px;
    border: 1px solid var(--panel-border);
    background: transparent;
    cursor: pointer;
    padding: 2px;
  }

  /* ===== Bottom audio player ===== */
  .player {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--panel-bg);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-top: 1px solid var(--panel-border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    z-index: 7;
    transition: opacity 0.4s, transform 0.35s;
  }
  .player-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .player-btn:hover {
    background: var(--accent-soft);
    box-shadow: 0 0 10px var(--accent-glow);
  }
  .track-name {
    color: var(--text);
    font-size: 0.85rem;
    min-width: 120px;
    max-width: 220px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    letter-spacing: 0.04em;
  }
  .seek { flex: 1; }
  .time {
    color: var(--text-dim);
    font-size: 0.74rem;
    font-variant-numeric: tabular-nums;
    min-width: 84px;
    text-align: right;
    letter-spacing: 0.05em;
  }
  .upload-mini {
    color: var(--text-dim);
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    cursor: pointer;
    padding: 7px 12px;
    border: 1px solid var(--panel-border);
    transition: all 0.15s;
    font-family: inherit;
  }
  .upload-mini:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ===== Floating action buttons ===== */
  .float-btn {
    position: fixed;
    top: 16px;
    width: 42px;
    height: 42px;
    background: var(--panel-bg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--panel-border);
    color: var(--accent);
    cursor: pointer;
    font-size: 1.1rem;
    z-index: 9;
    transition: border-color 0.15s, box-shadow 0.2s, opacity 0.4s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    line-height: 1;
  }
  .float-btn:hover {
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .float-btn-left { left: 16px; }
  .float-btn-right { right: 16px; }

  /* Auto-hide all UI when idle (still visible on hover/move) */
  body.idle .panel,
  body.idle .player,
  body.idle .float-btn {
    opacity: 0;
    pointer-events: none;
  }

  /* Scrollbar */
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }
  .panel::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* Drag-over visual cue */
  body.dragging::after {
    content: "drop to load";
    position: fixed;
    inset: 12px;
    border: 1.5px dashed var(--accent);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    background: rgba(10, 10, 10, 0.5);
    pointer-events: none;
    z-index: 50;
    backdrop-filter: blur(6px);
  }
</style>
</head>
<body>

<canvas id="visualizer"></canvas>

<!-- Initial upload screen -->
<div id="drop-overlay" class="overlay">
  <div class="overlay-content">
    <h1 class="logo">tortuosity</h1>
    <p class="tagline">music made visible</p>
    <label for="audio-input" class="upload-btn">
      Choose audio file
      <input type="file" id="audio-input" accept="audio/*" hidden />
    </label>
    <p class="hint">or drag &amp; drop a track anywhere</p>
  </div>
</div>

<!-- Side control panel -->
<aside id="panel" class="panel">

  <div class="panel-section">
    <label class="section-label"><span>Visualizer</span></label>
    <div class="grid grid-2">
      <button class="opt-btn active" data-viz="radial">Radial</button>
      <button class="opt-btn" data-viz="particles">Particles</button>
      <button class="opt-btn" data-viz="geometric">Geometric</button>
      <button class="opt-btn" data-viz="kaleidoscope">Kaleidoscope</button>
    </div>
  </div>

  <div class="panel-section">
    <label class="section-label"><span>Color palette</span></label>
    <div class="palette-grid">
      <button class="palette-btn active" data-palette="lavender" style="--p1:#b388ff;--p2:#7c4dff;--p3:#ea80fc" title="Lavender"></button>
      <button class="palette-btn" data-palette="neon" style="--p1:#00e5ff;--p2:#ff4081;--p3:#ffea00" title="Neon"></button>
      <button class="palette-btn" data-palette="fire" style="--p1:#ff5252;--p2:#ff9100;--p3:#ffea00" title="Fire"></button>
      <button class="palette-btn" data-palette="ocean" style="--p1:#1de9b6;--p2:#00b0ff;--p3:#3d5afe" title="Ocean"></button>
      <button class="palette-btn" data-palette="mono" style="--p1:#ffffff;--p2:#bbbbbb;--p3:#666666" title="Mono"></button>
    </div>
    <div class="custom-row">
      <label for="custom-color">Custom</label>
      <input type="color" id="custom-color" value="#b388ff" />
    </div>
  </div>

  <div class="panel-section">
    <label class="slider-label">
      <span>Beat sensitivity</span>
      <span id="sens-value">1.30</span>
    </label>
    <input type="range" id="sensitivity" min="1.00" max="2.00" step="0.05" value="1.30" />
  </div>

  <div class="panel-section">
    <label class="slider-label">
      <span>Smoothing</span>
      <span id="smooth-value">0.80</span>
    </label>
    <input type="range" id="smoothing" min="0" max="0.95" step="0.05" value="0.80" />
  </div>

  <div class="panel-section">
    <label class="section-label"><span>Background</span></label>
    <div class="grid grid-3">
      <button class="opt-btn active" data-bg="solid">Solid</button>
      <button class="opt-btn" data-bg="trail">Trail</button>
      <button class="opt-btn" data-bg="gradient">Gradient</button>
    </div>
  </div>

  <!-- Per-visualizer controls (only one visible at a time) -->
  <div class="panel-section viz-control" data-for="radial">
    <label class="slider-label">
      <span>Segments</span>
      <span id="radial-segs-value">96</span>
    </label>
    <input type="range" id="radial-segs" min="32" max="256" step="4" value="96" />
  </div>

  <div class="panel-section viz-control hidden" data-for="particles">
    <label class="slider-label">
      <span>Particle count</span>
      <span id="particle-count-value">220</span>
    </label>
    <input type="range" id="particle-count" min="50" max="600" step="10" value="220" />
  </div>

  <div class="panel-section viz-control hidden" data-for="geometric">
    <label class="section-label"><span>Shape</span></label>
    <div class="grid grid-2">
      <button class="opt-btn active" data-shape="circle">Circle</button>
      <button class="opt-btn" data-shape="triangle">Triangle</button>
      <button class="opt-btn" data-shape="square">Square</button>
      <button class="opt-btn" data-shape="hexagon">Hexagon</button>
    </div>
  </div>

  <div class="panel-section viz-control hidden" data-for="kaleidoscope">
    <label class="section-label"><span>Mirror segments</span></label>
    <div class="grid grid-4">
      <button class="opt-btn" data-kal="4">4</button>
      <button class="opt-btn active" data-kal="6">6</button>
      <button class="opt-btn" data-kal="8">8</button>
      <button class="opt-btn" data-kal="12">12</button>
    </div>
  </div>

</aside>

<!-- Bottom audio player (hidden until a track is loaded) -->
<div id="player" class="player hidden">
  <button id="play-pause" class="player-btn" aria-label="Play / pause">▶</button>
  <span id="track-name" class="track-name">No track loaded</span>
  <input type="range" id="seek" class="seek" min="0" max="100" step="0.1" value="0" />
  <span id="time" class="time">0:00 / 0:00</span>
  <label for="audio-input-2" class="upload-mini">
    Change file
    <input type="file" id="audio-input-2" accept="audio/*" hidden />
  </label>
</div>

<!-- Floating buttons -->
<button id="toggle-panel" class="float-btn float-btn-left" aria-label="Toggle controls" title="Toggle controls (H)">☰</button>
<button id="fullscreen" class="float-btn float-btn-right" aria-label="Fullscreen" title="Fullscreen (F)">⛶</button>

<script>
(() => {
  // =====================================================================
  // STATE
  // =====================================================================
  const state = {
    visualizer: 'radial',
    palette: 'lavender',
    customColor: '#b388ff',
    useCustomColor: false,
    sensitivity: 1.30,
    smoothing: 0.80,
    background: 'solid',
    radialSegments: 96,
    particleCount: 220,
    geoShape: 'circle',
    kalSegments: 6,
  };

  const palettes = {
    lavender: ['#b388ff', '#7c4dff', '#ea80fc'],
    neon:     ['#00e5ff', '#ff4081', '#ffea00'],
    fire:     ['#ff5252', '#ff9100', '#ffea00'],
    ocean:    ['#1de9b6', '#00b0ff', '#3d5afe'],
    mono:     ['#ffffff', '#bbbbbb', '#666666'],
  };

  function shadeColor(hex, percent) {
    let r = parseInt(hex.slice(1, 3), 16);
    let g = parseInt(hex.slice(3, 5), 16);
    let b = parseInt(hex.slice(5, 7), 16);
    r = Math.min(255, Math.max(0, r + Math.floor(2.55 * percent)));
    g = Math.min(255, Math.max(0, g + Math.floor(2.55 * percent)));
    b = Math.min(255, Math.max(0, b + Math.floor(2.55 * percent)));
    return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
  }

  function getPalette() {
    if (state.useCustomColor) {
      return [state.customColor, shadeColor(state.customColor, -22), shadeColor(state.customColor, 22)];
    }
    return palettes[state.palette];
  }

  // =====================================================================
  // CANVAS
  // =====================================================================
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = Math.floor(window.innerWidth  * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // =====================================================================
  // AUDIO
  // =====================================================================
  let audioCtx = null;
  let analyser = null;
  let source = null;
  let audioElement = null;
  let freqData = null;

  function setupAudio(file) {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioElement) {
      audioElement.pause();
      try { URL.revokeObjectURL(audioElement.src); } catch (_) {}
      audioElement.src = '';
    }

    audioElement = new Audio();
    audioElement.src = URL.createObjectURL(file);
    audioElement.crossOrigin = 'anonymous';

    if (source) try { source.disconnect(); } catch (_) {}
    source = audioCtx.createMediaElementSource(audioElement);

    if (!analyser) {
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;
    }
    analyser.smoothingTimeConstant = state.smoothing;

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    freqData = new Uint8Array(analyser.frequencyBinCount);

    document.getElementById('drop-overlay').classList.add('hidden');
    document.getElementById('player').classList.remove('hidden');
    document.getElementById('track-name').textContent = file.name;
    document.getElementById('seek').value = 0;

    audioElement.addEventListener('loadedmetadata', updateTime);
    audioElement.addEventListener('timeupdate', updateTime);
    audioElement.addEventListener('ended', () => {
      document.getElementById('play-pause').textContent = '▶';
    });

    audioCtx.resume();
    audioElement.play().catch(() => {});
    document.getElementById('play-pause').textContent = '⏸';
  }

  // =====================================================================
  // BEAT DETECTION (energy threshold over rolling history)
  // =====================================================================
  const bassHistory = [];
  const HISTORY_FRAMES = 43; // ~1 second at 43fps
  let beatPulse = 0;         // 1.0 on beat, decays each frame
  let lastBeatTime = 0;

  function detectBeat() {
    if (!freqData) return false;
    const bassEnd = Math.floor(freqData.length * 0.10);
    let sum = 0;
    for (let i = 0; i < bassEnd; i++) sum += freqData[i];
    const avg = sum / bassEnd;

    bassHistory.push(avg);
    if (bassHistory.length > HISTORY_FRAMES) bassHistory.shift();

    let histAvg = 0;
    for (let i = 0; i < bassHistory.length; i++) histAvg += bassHistory[i];
    histAvg /= bassHistory.length || 1;

    const now = performance.now();
    if (avg > histAvg * state.sensitivity && avg > 18 && now - lastBeatTime > 180) {
      lastBeatTime = now;
      beatPulse = 1;
      return true;
    }
    return false;
  }

  function avgRange(arr, start, end) {
    let sum = 0;
    const e = Math.min(end, arr.length);
    for (let i = start; i < e; i++) sum += arr[i];
    return sum / Math.max(1, e - start);
  }

  // =====================================================================
  // BACKGROUND
  // =====================================================================
  function drawBackground(w, h) {
    if (state.background === 'solid') {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, w, h);
    } else if (state.background === 'trail') {
      ctx.fillStyle = 'rgba(10, 10, 10, 0.16)';
      ctx.fillRect(0, 0, w, h);
    } else if (state.background === 'gradient') {
      const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) / 1.2);
      grad.addColorStop(0, '#181028');
      grad.addColorStop(1, '#0a0a0a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }
  }

  // =====================================================================
  // VISUALIZER 1: RADIAL SPECTRUM
  // =====================================================================
  function drawRadial(w, h) {
    const cx = w / 2, cy = h / 2;
    const palette = getPalette();
    const segments = state.radialSegments;
    const baseRadius = Math.min(w, h) * 0.16 + beatPulse * 28;
    const maxBarLen = Math.min(w, h) * 0.28;

    // Pulsing core
    const coreR = baseRadius * (0.55 + beatPulse * 0.25);
    const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
    coreGrad.addColorStop(0, palette[0] + 'cc');
    coreGrad.addColorStop(1, palette[0] + '00');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
    ctx.fill();

    // Outer bars
    const usableBins = Math.floor(freqData.length * 0.7);
    const step = usableBins / segments;
    const barWidth = (Math.PI * 2 * baseRadius) / segments * 0.7;

    for (let i = 0; i < segments; i++) {
      const idx = Math.floor(i * step);
      const value = freqData[idx] / 255;
      const angle = (i / segments) * Math.PI * 2 - Math.PI / 2;
      const barLen = value * maxBarLen + 4;

      const x1 = cx + Math.cos(angle) * baseRadius;
      const y1 = cy + Math.sin(angle) * baseRadius;
      const x2 = cx + Math.cos(angle) * (baseRadius + barLen);
      const y2 = cy + Math.sin(angle) * (baseRadius + barLen);

      const t = i / segments;
      const colorIdx = Math.floor(t * palette.length) % palette.length;
      ctx.strokeStyle = palette[colorIdx];
      ctx.lineWidth = barWidth;
      ctx.lineCap = 'round';
      ctx.globalAlpha = 0.6 + value * 0.4;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // =====================================================================
  // VISUALIZER 2: PARTICLE BURST
  // =====================================================================
  let particles = [];
  function drawParticles(w, h, beat) {
    const cx = w / 2, cy = h / 2;
    const palette = getPalette();

    // Burst on beat
    if (beat) {
      const slots = Math.max(0, state.particleCount - particles.length);
      const burstCount = Math.min(60, slots);
      for (let i = 0; i < burstCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 6;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          size: 2 + Math.random() * 4,
          color: palette[Math.floor(Math.random() * palette.length)],
        });
      }
    }

    // Steady ambient drift even without beats
    while (particles.length < Math.floor(state.particleCount * 0.30)) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.6 + Math.random() * 1.8;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        size: 1 + Math.random() * 2.5,
        color: palette[Math.floor(Math.random() * palette.length)],
      });
    }

    if (particles.length > state.particleCount) {
      particles = particles.slice(particles.length - state.particleCount);
    }

    const intensity = avgRange(freqData, 0, Math.floor(freqData.length * 0.4)) / 255;

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.992;
      p.vy *= 0.992;
      p.life -= 0.009;
      if (p.life <= 0 || p.x < -50 || p.x > w + 50 || p.y < -50 || p.y > h + 50) {
        particles.splice(i, 1);
        continue;
      }
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (0.7 + intensity * 0.7), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // =====================================================================
  // VISUALIZER 3: GEOMETRIC PULSE
  // =====================================================================
  let geoRotation = 0;
  function drawGeometric(w, h) {
    const cx = w / 2, cy = h / 2;
    const palette = getPalette();
    geoRotation += 0.005 + beatPulse * 0.025;

    const intensity = avgRange(freqData, 0, Math.floor(freqData.length * 0.3)) / 255;
    const baseSize = Math.min(w, h) * 0.18;
    const pulse = 1 + intensity * 0.45 + beatPulse * 0.5;

    for (let layer = 0; layer < 6; layer++) {
      const layerScale = pulse * (1 - layer * 0.13);
      if (layerScale <= 0) continue;
      const layerRot = geoRotation * (layer % 2 === 0 ? 1 : -1) * (1 + layer * 0.25);
      const size = baseSize * layerScale;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(layerRot);
      ctx.strokeStyle = palette[layer % palette.length];
      ctx.lineWidth = 2 + (5 - layer) * 0.6;
      ctx.globalAlpha = 0.95 - layer * 0.13;
      ctx.lineJoin = 'round';
      drawShape(state.geoShape, size);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawShape(shape, size) {
    ctx.beginPath();
    if (shape === 'circle') {
      ctx.arc(0, 0, size, 0, Math.PI * 2);
    } else if (shape === 'triangle') {
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
        const x = Math.cos(a) * size;
        const y = Math.sin(a) * size;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
    } else if (shape === 'square') {
      ctx.rect(-size, -size, size * 2, size * 2);
    } else if (shape === 'hexagon') {
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const x = Math.cos(a) * size;
        const y = Math.sin(a) * size;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
    }
    ctx.stroke();
  }

  // =====================================================================
  // VISUALIZER 4: KALEIDOSCOPE
  // =====================================================================
  let kalAngle = 0;
  function drawKaleidoscope(w, h) {
    const cx = w / 2, cy = h / 2;
    const palette = getPalette();
    const segs = state.kalSegments;
    const angleStep = (Math.PI * 2) / segs;
    const radius = Math.min(w, h) * 0.55;

    kalAngle += 0.004 + beatPulse * 0.012;

    const time = performance.now() * 0.001;
    const numShapes = 9;

    for (let s = 0; s < segs; s++) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(s * angleStep + kalAngle);
      if (s % 2 === 1) ctx.scale(-1, 1);

      // Clip to wedge
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, radius, -angleStep / 2, angleStep / 2);
      ctx.closePath();
      ctx.clip();

      // Pattern inside wedge
      for (let i = 0; i < numShapes; i++) {
        const binIdx = Math.floor(i * freqData.length / (numShapes * 2));
        const freq = freqData[binIdx] / 255;
        const r = (i / numShapes) * radius * 0.95 + Math.sin(time * 1.4 + i) * 18;
        const a = Math.sin(time * 0.6 + i * 0.7) * angleStep * 0.4;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        const size = 8 + freq * 70 + beatPulse * 20;

        ctx.fillStyle = palette[i % palette.length];
        ctx.globalAlpha = 0.55 + freq * 0.4;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // =====================================================================
  // RENDER LOOP
  // =====================================================================
  function render() {
    requestAnimationFrame(render);
    const w = window.innerWidth;
    const h = window.innerHeight;

    if (analyser && freqData) {
      analyser.getByteFrequencyData(freqData);
    }

    const beat = detectBeat();
    beatPulse *= 0.90;

    drawBackground(w, h);

    if (!freqData) return;

    switch (state.visualizer) {
      case 'radial':       drawRadial(w, h); break;
      case 'particles':    drawParticles(w, h, beat); break;
      case 'geometric':    drawGeometric(w, h); break;
      case 'kaleidoscope': drawKaleidoscope(w, h); break;
    }
  }
  render();

  // =====================================================================
  // UI WIRING
  // =====================================================================
  // File pickers
  document.querySelectorAll('#audio-input, #audio-input-2').forEach(input => {
    input.addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (file) setupAudio(file);
      e.target.value = '';
    });
  });

  // Drag & drop anywhere
  document.addEventListener('dragenter', e => {
    e.preventDefault();
    document.body.classList.add('dragging');
  });
  document.addEventListener('dragover', e => { e.preventDefault(); });
  document.addEventListener('dragleave', e => {
    if (e.target === document.documentElement) {
      document.body.classList.remove('dragging');
    }
  });
  document.addEventListener('drop', e => {
    e.preventDefault();
    document.body.classList.remove('dragging');
    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (file && file.type.startsWith('audio/')) setupAudio(file);
  });

  // Visualizer buttons
  document.querySelectorAll('[data-viz]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-viz]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.visualizer = btn.dataset.viz;
      document.querySelectorAll('.viz-control').forEach(c => {
        c.classList.toggle('hidden', c.dataset.for !== state.visualizer);
      });
    });
  });

  // Palette buttons
  document.querySelectorAll('[data-palette]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-palette]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.palette = btn.dataset.palette;
      state.useCustomColor = false;
    });
  });

  document.getElementById('custom-color').addEventListener('input', e => {
    state.customColor = e.target.value;
    state.useCustomColor = true;
    document.querySelectorAll('[data-palette]').forEach(b => b.classList.remove('active'));
  });

  // Sliders
  const sensSlider = document.getElementById('sensitivity');
  sensSlider.addEventListener('input', e => {
    state.sensitivity = parseFloat(e.target.value);
    document.getElementById('sens-value').textContent = state.sensitivity.toFixed(2);
  });

  const smoothSlider = document.getElementById('smoothing');
  smoothSlider.addEventListener('input', e => {
    state.smoothing = parseFloat(e.target.value);
    document.getElementById('smooth-value').textContent = state.smoothing.toFixed(2);
    if (analyser) analyser.smoothingTimeConstant = state.smoothing;
  });

  // Background buttons
  document.querySelectorAll('[data-bg]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-bg]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.background = btn.dataset.bg;
    });
  });

  // Per-viz: radial segments
  document.getElementById('radial-segs').addEventListener('input', e => {
    state.radialSegments = parseInt(e.target.value, 10);
    document.getElementById('radial-segs-value').textContent = state.radialSegments;
  });

  // Per-viz: particle count
  document.getElementById('particle-count').addEventListener('input', e => {
    state.particleCount = parseInt(e.target.value, 10);
    document.getElementById('particle-count-value').textContent = state.particleCount;
  });

  // Per-viz: shape
  document.querySelectorAll('[data-shape]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-shape]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.geoShape = btn.dataset.shape;
    });
  });

  // Per-viz: kaleidoscope segments
  document.querySelectorAll('[data-kal]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-kal]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.kalSegments = parseInt(btn.dataset.kal, 10);
    });
  });

  // Toggle panel
  const panel = document.getElementById('panel');
  document.getElementById('toggle-panel').addEventListener('click', () => {
    panel.classList.toggle('collapsed');
  });

  // Fullscreen
  document.getElementById('fullscreen').addEventListener('click', toggleFullscreen);
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
    if (e.key === 'h' || e.key === 'H') panel.classList.toggle('collapsed');
    if (e.key === ' ' && audioElement) {
      e.preventDefault();
      togglePlay();
    }
  });

  // Player controls
  function togglePlay() {
    if (!audioElement) return;
    if (audioElement.paused) {
      audioCtx && audioCtx.resume();
      audioElement.play().catch(() => {});
      document.getElementById('play-pause').textContent = '⏸';
    } else {
      audioElement.pause();
      document.getElementById('play-pause').textContent = '▶';
    }
  }
  document.getElementById('play-pause').addEventListener('click', togglePlay);

  document.getElementById('seek').addEventListener('input', e => {
    if (!audioElement || !audioElement.duration) return;
    audioElement.currentTime = (e.target.value / 100) * audioElement.duration;
  });

  function updateTime() {
    if (!audioElement) return;
    const t = audioElement.currentTime || 0;
    const d = audioElement.duration || 0;
    const seek = document.getElementById('seek');
    if (document.activeElement !== seek) {
      seek.value = d ? (t / d) * 100 : 0;
    }
    document.getElementById('time').textContent = `${fmt(t)} / ${fmt(d)}`;
  }
  function fmt(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  // Auto-hide UI when idle
  let activityTimer = null;
  function showUI() {
    document.body.classList.remove('idle');
    if (activityTimer) clearTimeout(activityTimer);
    activityTimer = setTimeout(() => {
      document.body.classList.add('idle');
    }, 3500);
  }
  ['mousemove', 'mousedown', 'keydown', 'touchstart', 'wheel'].forEach(ev => {
    document.addEventListener(ev, showUI, { passive: true });
  });
  showUI();
})();
</script>

</body>
</html>
